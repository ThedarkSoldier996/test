name: Upload novaplay.json to Supabase

on:
  push:
    paths:
      - "novaplay.json"

  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Requests
        run: pip install requests

      - name: Subir novaplay.json a Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python << 'EOF'
          import os
          import requests

          url = f"{os.environ['SUPABASE_URL']}/storage/v1/object/Novaplay/novaplay.json"

          headers = {
              "Authorization": f"Bearer {os.environ['SUPABASE_SERVICE_ROLE_KEY']}",
              "apikey": os.environ['SUPABASE_SERVICE_ROLE_KEY'],
              "Content-Type": "application/json",
              "x-upsert": "true"
          }

          with open("novaplay.json", "rb") as f:
              r = requests.post(url, headers=headers, data=f)

          print("Código:", r.status_code)
          print(r.text)

          r.raise_for_status()

          print("✔ novaplay.json subido correctamente a Supabase.")
          EOF
