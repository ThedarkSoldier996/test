name: UPDATE DAILYMOTION

on:
  workflow_dispatch:

  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Actualizar enlaces
        run: python update_dailymotion.py

      - name: Commit y Push (solo si hubo cambios)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "✅ No hubo cambios."
            exit 0
          fi

          git commit -m "Auto Update Dailymotion"
          git push

          echo "🚀 Se detectaron cambios y fueron enviados a GitHub."
