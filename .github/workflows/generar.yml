name: Generar M3U

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar requests
        run: pip install requests

      - name: Ejecutar script
        run: python convertir.py

      - name: Commit archivo M3U
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add lista.m3u
          git commit -m "Actualizar M3U" || echo "sin cambios"
          git push
