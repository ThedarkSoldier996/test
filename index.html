<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaPlay OTT Admin</title>

<style>

*{
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  margin:0;
  background:#0a0d12;
  color:#fff;
}

/* layout */
.app{
  display:flex;
  height:100vh;
}

/* sidebar */
.sidebar{
  width:220px;
  background:#0f141c;
  border-right:1px solid #1f2a3a;
  padding:15px;
  overflow-y:auto;
}

.sidebar h2{
  font-size:14px;
  opacity:0.7;
}

.cat{
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  cursor:pointer;
  background:#151c27;
}

.cat:hover{
  background:#1d2635;
}

/* main */
.main{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* top bar */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

button{
  background:#00d0ff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
  gap:12px;
}

/* card */
.card{
  background:#121a25;
  border:1px solid #1f2a3a;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:80px;
  object-fit:contain;
}

.badge{
  font-size:10px;
  padding:2px 6px;
  border-radius:6px;
  background:red;
  display:inline-block;
  margin-top:5px;
}

/* modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:400px;
  background:#121a25;
  padding:20px;
  border-radius:12px;
}

input, select, textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#0f141c;
  border:1px solid #1f2a3a;
  color:#fff;
  border-radius:8px;
}

.hidden{ display:none; }

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>CATEGORÍAS</h2>
    <div id="cats"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h3>Canales</h3>
      <button onclick="openModal()">+ Agregar</button>
    </div>

    <div class="grid" id="grid"></div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-content">

    <h3>Nuevo Canal</h3>

    <select id="category"></select>

    <input id="name" placeholder="Nombre">
    <input id="url" placeholder="URL">
    <input id="logo" placeholder="Logo">

    <select id="nsfw">
      <option value="no">Normal</option>
      <option value="yes">NSFW</option>
    </select>

    <select id="protection" onchange="toggle()">
      <option value="no">Sin protección</option>
      <option value="yes">Con protección</option>
    </select>

    <div id="prot" class="hidden">

      <input id="referer" placeholder="Referer">
      <input id="drmType" placeholder="DRM">
      <input id="license" placeholder="License">

    </div>

    <button onclick="send()">Guardar</button>
    <button onclick="closeModal()">Cerrar</button>

  </div>

</div>

<script>

const API =
"https://api.github.com/repos/ThedarkSoldier996/test/dispatches";

const RAW =
"https://raw.githubusercontent.com/ThedarkSoldier996/test/main/novaplay.json";

/* cargar data */
let DATA = [];

async function load(){

  const res = await fetch(RAW + "?t=" + Date.now());
  DATA = await res.json();

  renderCats();
  renderGrid(DATA);

  loadSelect();
}

/* categorias sidebar */
function renderCats(){

  const el = document.getElementById("cats");
  el.innerHTML = "";

  DATA
    .filter(x =>
      x.type === "category" &&
      !x.title.toLowerCase().includes("pluto") &&
      !x.title.toLowerCase().includes("rakuten")
    )
    .forEach(c => {

      const div = document.createElement("div");
      div.className = "cat";
      div.innerText = c.title;

      div.onclick = () => {

        const cat = DATA.find(x => x.title === c.title);

        renderGrid(cat.channels || []);

      };

      el.appendChild(div);

    });

}

/* grid canales */
function renderGrid(channels){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  channels.forEach(ch => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${ch.logo || ''}">
      <div>${ch.name}</div>
      ${ch.nsfw === "yes" ? '<div class="badge">NSFW</div>' : ''}
    `;

    grid.appendChild(card);

  });

}

/* select categorias */
function loadSelect(){

  const sel = document.getElementById("category");
  sel.innerHTML = "";

  DATA.filter(x => x.type === "category")
      .forEach(c => {

        const opt = document.createElement("option");
        opt.value = c.title;
        opt.innerText = c.title;

        sel.appendChild(opt);

      });

}

/* modal */
function openModal(){
  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

/* proteccion */
function toggle(){

  prot.style.display =
    protection.value === "yes"
    ? "block"
    : "none";

}

/* enviar */
async function send(){

  const payload = {

    category: category.value,
    name: name.value,
    url: url.value,
    logo: logo.value,

    nsfw: nsfw.value,

    protection: protection.value,
    referer: referer.value,
    drmType: drmType.value,
    license: license.value

  };

  await fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      event_type:"add_channel",
      client_payload:payload
    })
  });

  alert("Enviado ✔");

  closeModal();

}

load();

</script>

</body>
</html>
