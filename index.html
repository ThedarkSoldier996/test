<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NovaPlay Panel</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Agregar Canal</h2>

<select id="category">
  <option>Deportes</option>
  <option>Peliculas</option>
</select>

<input id="name" placeholder="Nombre">
<input id="url" placeholder="URL">
<input id="logo" placeholder="Logo">

<input id="info" placeholder="Info">
<textarea id="texto" placeholder="Texto"></textarea>

<select id="nsfw">
  <option value="no">No NSFW</option>
  <option value="yes">NSFW</option>
</select>

<select id="protection">
  <option value="no">Sin protección</option>
  <option value="yes">Con protección</option>
</select>

<input id="referer" placeholder="Referer">
<input id="drmType" placeholder="DRM type">
<input id="license" placeholder="License URL">

<button onclick="send()">Enviar</button>

<script>

const API =
"https://api.github.com/repos/ThedarkSoldier996/test/dispatches";

async function send(){

  const category = document.getElementById("category").value;
  const name = document.getElementById("name").value;
  const url = document.getElementById("url").value;
  const logo = document.getElementById("logo").value;

  const info = document.getElementById("info").value;
  const texto = document.getElementById("texto").value;

  const nsfw = document.getElementById("nsfw").value;

  const protection = document.getElementById("protection").value;
  const referer = document.getElementById("referer").value;
  const drmType = document.getElementById("drmType").value;
  const license = document.getElementById("license").value;

  await fetch(API, {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      event_type: "add_channel",
      client_payload: {
        category,
        name,
        url,
        logo,
        info,
        texto,
        nsfw,
        protection,
        referer,
        drmType,
        license
      }
    })
  });

  alert("Enviado a GitHub Actions");
}

</script>

</body>
</html>
